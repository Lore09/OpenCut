apiVersion: v1
kind: ConfigMap
metadata:
  name: opencut-config
  namespace: opencut
data:
  NODE_ENV: "production"
  DATABASE_URL: "postgresql://opencut:opencut@postgres:5432/opencut"
  UPSTASH_REDIS_REST_URL: "http://serverless-redis-http:80"
  NEXT_PUBLIC_SITE_URL: "https://opencut.local"
  NEXT_PUBLIC_MARBLE_API_URL: "https://api.marblecms.com"
  SRH_MODE: "env"
  SRH_CONNECTION_STRING: "redis://redis:6379"
