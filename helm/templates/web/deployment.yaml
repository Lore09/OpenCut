apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opencut.fullname" . }}-web
  namespace: {{ .Values.namespace }}
  labels:
    app: web
    {{- include "opencut.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.web.service.targetPort }}
          envFrom:
            - configMapRef:
                name: {{ include "opencut.fullname" . }}-config
            - secretRef:
                name: {{ include "opencut.fullname" . }}-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.web.service.targetPort }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.web.service.targetPort }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
