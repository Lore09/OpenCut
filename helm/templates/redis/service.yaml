{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opencut.fullname" . }}-redis
  namespace: {{ .Values.namespace }}
  labels:
    app: redis
    {{- include "opencut.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: redis
{{- end }}
